spring:
  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/seed.sql
  datasource:
    url: jdbc:postgresql://localhost:5432/ticket_system
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TicketSystemHikariPool
      auto-commit: true
      transaction-isolation: TRANSACTION_READ_COMMITTED
      minimum-idle: 5
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        index-type: HNSW
    model:
      chat: openai
      embedding: openai
    openai:
      api-key: ${DS_API_KEY}
      chat:
        base-url: https://api.deepseek.com
        api-key: ${DS_API_KEY}
        options:
          model: deepseek-v4-flash
          temperature: 0.3
      embedding:
        options:
          model: BAAI/bge-m3
        base-url: https://api.siliconflow.cn
        api-key: ${EMBEDDING_API_KEY:}

app:
  ai:
    provider: deepseek
    ask:
      provider: deepseek
      high-threshold: 0.82
      medium-threshold: 0.70
      top-k: 3
      knowledge:
        provider: pgvector
        seed:
          enabled: false
    similarity:
      provider: pgvector
    index:
      provider: pgvector
      seed:
        enabled: false
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-at-least-32-bytes}
    expiration-minutes: 120

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
    org.hibernate.orm.connections.pooling: warn
    org.springframework.jdbc.core: warn
    org.springframework.orm.jpa: warn
    org.springframework.ai.vectorstore.pgvector: warn
