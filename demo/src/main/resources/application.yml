spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ticket_system
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        index-type: HNSW
    model:
      chat: openai
      embedding: openai
    openai:
      api-key: ${DS_API_KEY}
      chat:
        base-url: https://api.deepseek.com
        api-key: ${DS_API_KEY}
        options:
          model: deepseek-v4-flash
          temperature: 0.3
      embedding:
        options:
          model: text-embedding-ada-002
        base-url: https://botcf.com
        api-key: ${EMBEDDING_API_KEY:}

app:
  ai:
    provider: local
    similarity:
      provider: none
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-at-least-32-bytes}
    expiration-minutes: 120
